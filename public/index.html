<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend - Backend MongoDB Example</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    input, button { padding: 8px; margin: 4px 0; }
    ul { padding-left: 20px; }
    li { margin: 8px 0; }
  </style>
</head>
<body>
  <h1>Frontend / Backend MongoDB Example</h1>

  <section>
    <form id="item-form">
      <label for="item-name">New item:</label><br />
      <input id="item-name" type="text" placeholder="Enter item name" required />
      <button type="submit">Add Item</button>
    </form>
  </section>

  <section>
    <h2>Items</h2>
    <ul id="items-list"></ul>
  </section>

  <script src="app.js"></script>
</body>
</html>
